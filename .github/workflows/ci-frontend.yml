name: ITBM Frontend CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./FRONTEND

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: ./FRONTEND/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Opcional: Se os E2Es dependem do backend de pé, precisaríamos rodar o backend aqui. 
    # Porém nossos testes atuais (Fase 1-3) usam mock de server/fixtures no config do PW ou apontam pra Dev.
    # Por hora, apenas rodamos contra a config atual do Playwright (locahost / mocked state).
    
    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: FRONTEND/playwright-report/
        retention-days: 7
