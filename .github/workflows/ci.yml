name: ITBM Backend CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test:
    name: Backend CI Pipeline
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "@FelipeL89*"
          POSTGRES_DB: itbm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./BACKEND

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./BACKEND/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Security Audit (Phase 5.3)
      run: npm run test:security
      continue-on-error: true # Permite falhar sem quebrar o CI imediato dependendo da severity policy 

    - name: Setup Prisma Database (Test Env)
      run: |
        npx prisma generate
        npm run prisma:test
      env:
        DATABASE_URL: postgresql://postgres:%40FelipeL89%2A@localhost:5432/itbm_test?schema=public

    - name: Run Unit Tests & Coverage (Phase 4 & 5.2)
      run: npm run test -- --coverage
      env:
        NODE_ENV: test
        JWT_SECRET: super_secret_test_key

    - name: Run Integration Tests (Phase 4)
      run: npm run test:integration
      env:
        NODE_ENV: test
        JWT_SECRET: super_secret_test_key
        DATABASE_URL: postgresql://postgres:%40FelipeL89%2A@localhost:5432/itbm_test?schema=public
